<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenBank TBL Validator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

  :root {
    --bg:       #0a0c0f;
    --surface:  #111418;
    --panel:    #161a20;
    --border:   #1e2530;
    --border2:  #252d38;
    --text:     #c8d3e0;
    --muted:    #4a5568;
    --accent:   #00d4aa;
    --accent2:  #0099ff;
    --crit:     #ff4757;
    --warn:     #ffa502;
    --info:     #2ed573;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Space Grotesk', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* animated grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── header ── */
  header {
    padding: 36px 0 28px;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    box-shadow: 0 0 20px rgba(0,212,170,.3);
  }
  header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -.02em; }
  header p  { font-size: .8rem; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
  .badge {
    margin-left: auto;
    background: rgba(0,212,170,.1);
    border: 1px solid rgba(0,212,170,.3);
    color: var(--accent);
    font-family: var(--mono); font-size: .7rem; font-weight: 500;
    padding: 4px 10px; border-radius: 20px;
    letter-spacing: .05em;
  }

  /* ── controls ── */
  .controls {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    margin: 28px 0 20px;
    align-items: end;
  }

  .field-group { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: .72rem; font-weight: 600; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }

  select, .org-select {
    background: var(--panel);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--sans);
    font-size: .85rem;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    cursor: pointer;
    transition: border-color .2s;
  }
  select:hover { border-color: var(--accent); }

  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    font-family: var(--sans);
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 20px rgba(0,212,170,.25);
  }
  .btn-primary:hover { background: #00f0c0; box-shadow: 0 0 30px rgba(0,212,170,.4); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border2);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ── drop zone ── */
  .dropzone {
    border: 2px dashed var(--border2);
    border-radius: 12px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--panel);
    margin-bottom: 20px;
    position: relative;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(0,212,170,.04);
    box-shadow: inset 0 0 40px rgba(0,212,170,.04);
  }
  .dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .dropzone-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .dropzone-text { font-size: .95rem; color: var(--text); margin-bottom: 4px; }
  .dropzone-sub  { font-size: .78rem; color: var(--muted); font-family: var(--mono); }
  .file-loaded { color: var(--accent); font-family: var(--mono); font-size: .85rem; margin-top: 8px; }

  /* ── textarea ── */
  .paste-area {
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 16px;
    font-family: var(--mono);
    font-size: .78rem;
    color: var(--text);
    width: 100%;
    height: 220px;
    resize: vertical;
    outline: none;
    line-height: 1.6;
    transition: border-color .2s;
    tab-size: 4;
  }
  .paste-area:focus { border-color: var(--accent); }
  .paste-area::placeholder { color: var(--muted); }

  /* ── summary bar ── */
  .summary-bar {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin: 24px 0 20px;
    padding: 16px 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .stat {
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 20px;
    border-radius: 8px;
    min-width: 100px;
    flex: 1;
  }
  .stat-value { font-size: 2rem; font-weight: 700; font-family: var(--mono); line-height: 1; }
  .stat-label { font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-top: 4px; }
  .stat-crit  { background: rgba(255,71,87,.08); border: 1px solid rgba(255,71,87,.2); }
  .stat-warn  { background: rgba(255,165,2,.08);  border: 1px solid rgba(255,165,2,.2); }
  .stat-info  { background: rgba(46,213,115,.08); border: 1px solid rgba(46,213,115,.2); }
  .stat-feat  { background: rgba(0,153,255,.08);  border: 1px solid rgba(0,153,255,.2); }
  .stat-crit .stat-value { color: var(--crit); }
  .stat-warn .stat-value { color: var(--warn); }
  .stat-info .stat-value { color: var(--info); }
  .stat-feat .stat-value { color: var(--accent2); }

  /* ── issue list ── */
  .section-title {
    font-size: .72rem; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted);
    margin: 28px 0 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .issue {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 8px;
    display: flex; gap: 14px; align-items: flex-start;
    animation: slideIn .15s ease both;
    transition: border-color .2s, box-shadow .2s;
  }
  .issue:hover { box-shadow: 0 2px 20px rgba(0,0,0,.3); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .issue.critical { border-left-color: var(--crit); }
  .issue.warning  { border-left-color: var(--warn); }
  .issue.info     { border-left-color: var(--info); }

  .issue-badge {
    font-size: .65rem; font-weight: 700; letter-spacing: .08em;
    padding: 3px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
    font-family: var(--mono); margin-top: 1px;
  }
  .issue.critical .issue-badge { background: rgba(255,71,87,.15); color: var(--crit); }
  .issue.warning  .issue-badge { background: rgba(255,165,2,.15);  color: var(--warn); }
  .issue.info     .issue-badge { background: rgba(46,213,115,.15); color: var(--info); }

  .issue-body { flex: 1; }
  .issue-code  { font-family: var(--mono); font-size: .72rem; color: var(--muted); margin-bottom: 4px; }
  .issue-msg   { font-size: .85rem; line-height: 1.55; white-space: pre-wrap; }

  .feature-info {
    margin-top: 6px; font-family: var(--mono); font-size: .72rem;
    color: var(--muted);
    background: var(--surface);
    padding: 6px 10px; border-radius: 6px;
    border: 1px solid var(--border);
  }

  /* ── features table ── */
  .features-table-wrap { overflow-x: auto; margin-top: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: .78rem; }
  th {
    text-align: left; padding: 10px 14px;
    font-size: .68rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
  }
  td { padding: 9px 14px; border-bottom: 1px solid var(--border); font-family: var(--mono); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .tag {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: .68rem; font-weight: 600;
  }
  .tag-gene    { background: rgba(0,153,255,.15); color: #5eb8ff; }
  .tag-cds     { background: rgba(0,212,170,.15); color: var(--accent); }
  .tag-trna    { background: rgba(255,165,2,.15);  color: var(--warn); }
  .tag-rrna    { background: rgba(255,71,87,.15);  color: #ff8a96; }
  .tag-misc    { background: rgba(128,128,128,.15); color: #888; }
  .strand-plus  { color: var(--info); }
  .strand-minus { color: var(--crit); }

  /* ── loading / empty states ── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-family: var(--mono); font-size: .85rem;
  }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: .4; }

  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 40px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── tab bar ── */
  .tabs { display: flex; gap: 2px; margin: 24px 0 0; }
  .tab {
    padding: 9px 20px; border-radius: 8px 8px 0 0;
    font-size: .82rem; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border);
    border-bottom: none; background: var(--surface);
    color: var(--muted); transition: all .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--panel); color: var(--text); border-color: var(--border); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .tab-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0 10px 10px 10px;
    padding: 20px;
  }

  /* ── filter chips ── */
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .chip {
    padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border2);
    font-size: .75rem; font-weight: 600; cursor: pointer;
    background: var(--surface); color: var(--muted);
    transition: all .15s;
  }
  .chip:hover  { border-color: var(--text); color: var(--text); }
  .chip.active { background: rgba(0,212,170,.1); border-color: var(--accent); color: var(--accent); }
  .chip.crit-chip.active { background: rgba(255,71,87,.1); border-color: var(--crit); color: var(--crit); }
  .chip.warn-chip.active { background: rgba(255,165,2,.1);  border-color: var(--warn); color: var(--warn); }
  .chip.info-chip.active { background: rgba(46,213,115,.1); border-color: var(--info); color: var(--info); }

  /* ── json viewer ── */
  .json-out {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
    font-family: var(--mono); font-size: .75rem;
    max-height: 400px; overflow: auto;
    white-space: pre; color: #8fa8c8;
    line-height: 1.6;
  }

  /* ── tooltip ── */
  [data-tip] { position: relative; cursor: help; }
  [data-tip]::after {
    content: attr(data-tip);
    position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    background: #1c2535; color: var(--text); font-size: .72rem;
    padding: 6px 10px; border-radius: 6px; white-space: nowrap;
    border: 1px solid var(--border2); pointer-events: none;
    opacity: 0; transition: opacity .15s; z-index: 10;
    font-family: var(--mono); margin-bottom: 6px;
  }
  [data-tip]:hover::after { opacity: 1; }

  /* ── scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── responsive ── */
  @media (max-width: 700px) {
    .controls { grid-template-columns: 1fr; }
    .summary-bar { flex-direction: column; }
    .stat { flex-direction: row; justify-content: space-between; min-width: 0; }
    .stat-value { font-size: 1.4rem; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">🧬</div>
    <div>
      <h1>GenBank TBL Validator</h1>
      <p>organelle feature table · 5-column format · submission-ready checks</p>
    </div>
    <div class="badge">v1.0.0</div>
  </header>

  <!-- Input controls -->
  <div style="margin-top:28px">
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept=".tbl,.txt,.feat,.fasta,.fa,.fna" multiple>
      <div class="dropzone-icon">📂</div>
      <div class="dropzone-text">Drop your <b>.tbl</b> and <b>.fasta</b> files here, or click to browse</div>
      <div class="dropzone-sub">Feature table (.tbl) + optional sequence file (.fasta)</div>
      <div class="file-loaded" id="fileLoaded" style="display:none"></div>
    </div>

    <div style="margin-bottom:8px; font-size:.75rem; color:var(--muted); text-align:center;">— or paste directly —</div>
    <textarea class="paste-area" id="pasteArea" placeholder=">Feature sequence_id&#10;372	299	tRNA&#10;		gene	trnD-GUC&#10;		product	tRNA-Asp&#10;&#10;3398	10908	gene&#10;		gene	nad4&#10;3398	3849	CDS&#10;5229	5743&#10;		gene	nad4&#10;		product	NADH dehydrogenase subunit 4&#10;		transl_table	2"></textarea>

    <div class="controls" style="margin-top:12px">
      <div class="field-group">
        <label>Organism Type</label>
        <select id="organism" class="org-select">
          <option value="animal">🦋 Animal mitochondrial</option>
          <option value="plant">🌿 Plant mitochondrial</option>
          <option value="plastid">🍃 Plastid / chloroplast</option>
        </select>
      </div>
      <button class="btn btn-secondary" onclick="loadExample()">Load example</button>
      <button class="btn btn-primary" id="validateBtn" onclick="runValidation()">▶ Validate</button>
    </div>
  </div>

  <!-- Results area -->
  <div id="results"></div>

</div>

<script>
// ── example data ──────────────────────────────────────────────────────────────
const EXAMPLE = `>Feature pyrgus_ruralis
3952\t5490\tgene
\t\t\tgene\tcox1
3952\t5490\tCDS
\t\t\tgene\tcox1
\t\t\tproduct\tcytochrome c oxidase subunit I
\t\t\ttransl_table\t5
5486\t5552\tgene
\t\t\tgene\ttrnL-UAA
5486\t5552\ttRNA
\t\t\tgene\ttrnL-UAA
\t\t\tproduct\ttRNA-Leu
5553\t6248\tgene
\t\t\tgene\tcox2
5553\t6248\tCDS
\t\t\tgene\tcox2
\t\t\tproduct\tcytochrome c oxidase subunit II
\t\t\ttransl_table\t5
6229\t6299\tgene
\t\t\tgene\ttrnK-UUU
6229\t6299\ttRNA
\t\t\tgene\ttrnK-UUU
\t\t\tproduct\ttRNA-Lys
10519\t8807\tgene
\t\t\tgene\tnad5
10519\t8807\tCDS
\t\t\tgene\tnad5
\t\t\tproduct\tNADH dehydrogenase subunit 5
\t\t\ttransl_table\t5
8832\t8767\tgene
\t\t\tgene\ttrnF-GAA
8832\t8767\ttRNA
\t\t\tgene\ttrnF-GAA
\t\t\tproduct\ttRNA-Phe
11926\t10586\tgene
\t\t\tgene\tnad4
11926\t10586\tCDS
\t\t\tgene\tnad4
\t\t\tproduct\tNADH dehydrogenase subunit 4
\t\t\ttransl_table\t5
10644\t10574\tgene
\t\t\tgene\ttrnH-GUG
10644\t10574\ttRNA
\t\t\tgene\ttrnH-GUG
\t\t\tproduct\ttRNA-His`;

function loadExample() {
  document.getElementById('pasteArea').value = EXAMPLE;
  document.getElementById('fileLoaded').style.display = 'none';
}

// ── file drag ─────────────────────────────────────────────────────────────────
const dz = document.getElementById('dropzone');
const fi = document.getElementById('fileInput');

dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const files = Array.from(e.dataTransfer.files);
  if (files.length) loadFiles(files);
});
fi.addEventListener('change', () => { if (fi.files.length) loadFiles(Array.from(fi.files)); });

function loadFiles(files) {
  let tblFile = null, fastaFile = null;
  
  for (const f of files) {
    const name = f.name.toLowerCase();
    if (name.endsWith('.tbl') || name.endsWith('.txt') || name.endsWith('.feat')) {
      tblFile = f;
    } else if (name.endsWith('.fasta') || name.endsWith('.fa') || name.endsWith('.fna')) {
      fastaFile = f;
    }
  }
  
  const promises = [];
  
  if (tblFile) {
    const p = new Promise(res => {
      const r = new FileReader();
      r.onload = ev => {
        document.getElementById('pasteArea').value = ev.target.result;
        res();
      };
      r.readAsText(tblFile);
    });
    promises.push(p);
  }
  
  if (fastaFile) {
    const p = new Promise(res => {
      const r = new FileReader();
      r.onload = ev => {
        parseFasta(ev.target.result);
        res();
      };
      r.readAsText(fastaFile);
    });
    promises.push(p);
  }
  
  Promise.all(promises).then(() => {
    const el = document.getElementById('fileLoaded');
    const parts = [];
    if (tblFile) parts.push(`${tblFile.name} (${(tblFile.size/1024).toFixed(1)} KB)`);
    if (fastaFile) parts.push(`${fastaFile.name} (${(fastaFile.size/1024).toFixed(1)} KB)`);
    el.textContent = `✓ ${parts.join(' + ')}`;
    el.style.display = 'block';
  });
}

function loadFile(f) {
  loadFiles([f]);
}

// ── FASTA parsing ─────────────────────────────────────────────────────────────
function parseFasta(text) {
  _fastaSequences = {};
  const lines = text.split(/\r?\n/);
  let currentId = null;
  let currentSeq = [];
  
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    
    if (trimmed.startsWith('>')) {
      // Save previous sequence
      if (currentId && currentSeq.length) {
        _fastaSequences[currentId] = currentSeq.join('').toUpperCase();
      }
      // Start new sequence
      currentId = trimmed.substring(1).split(/\s+/)[0]; // Take first word after >
      currentSeq = [];
    } else if (currentId) {
      currentSeq.push(trimmed);
    }
  }
  
  // Save last sequence
  if (currentId && currentSeq.length) {
    _fastaSequences[currentId] = currentSeq.join('').toUpperCase();
  }
  
  _fastaLoaded = Object.keys(_fastaSequences).length > 0;
  console.log(`FASTA loaded: ${Object.keys(_fastaSequences).length} sequence(s)`);
}

function extractCDSSequence(feature, seqId) {
  const fullSeq = _fastaSequences[seqId];
  if (!fullSeq) return null;
  
  let cdsSeq = '';
  for (const span of feature.spans) {
    const start = Math.min(span.start, span.end) - 1; // Convert to 0-based
    const end = Math.max(span.start, span.end);
    let segment = fullSeq.substring(start, end);
    
    // Reverse complement if on minus strand
    if (span.strand === '-') {
      segment = reverseComplement(segment);
    }
    
    cdsSeq += segment;
  }
  
  return cdsSeq;
}

function reverseComplement(seq) {
  const comp = {'A':'T','T':'A','G':'C','C':'G','N':'N'};
  return seq.split('').reverse().map(b => comp[b] || b).join('');
}

// ── parser ────────────────────────────────────────────────────────────────────
function parseFeatureTable(text) {
  const tables = [];
  let currentTable = null;
  let currentFeature = null;

  const COORD_RE = /^([<>]?)(\d+)\s+([<>]?)(\d+)(?:\s+(\S+))?\s*$/;
  const FEATURE_KEYS = new Set(['gene','CDS','tRNA','rRNA','mRNA','exon','intron',
    'repeat_region','misc_feature','misc_RNA','ncRNA','mobile_element','D-loop',
    'stem_loop','regulatory','rep_origin','LTR','3UTR','5UTR']);

  function flushFeature() {
    if (currentFeature && currentTable) {
      currentFeature.geneName    = getQ(currentFeature, 'gene');
      currentFeature.productName = getQ(currentFeature, 'product');
      currentTable.features.push(currentFeature);
    }
    currentFeature = null;
  }

  function getQ(feat, key) {
    return feat.qualifiers[key]?.[0] || null;
  }

  const lines = text.split(/\r?\n/);
  for (let lineno = 0; lineno < lines.length; lineno++) {
    const raw = lines[lineno];
    const stripped = raw.trim();
    if (!stripped || stripped.startsWith('#')) continue;

    // header
    const hm = stripped.match(/^>(?:Feature\s+)?(\S+)/);
    if (hm) {
      flushFeature();
      currentTable = { seqId: hm[1], features: [] };
      tables.push(currentTable);
      continue;
    }

    if (!currentTable) {
      currentTable = { seqId: '<unnamed>', features: [] };
      tables.push(currentTable);
    }

    // coord line
    const cm = stripped.match(COORD_RE);
    if (cm) {
      const start = parseInt(cm[2]), end = parseInt(cm[4]), ftype = cm[5] || null;
      const span = { start, end, strand: start > end ? '-' : '+',
                     low: Math.min(start,end), high: Math.max(start,end) };
      if (ftype) {
        flushFeature();
        currentFeature = {
          type: ftype, spans: [span], qualifiers: {},
          geneName: null, productName: null,
          partial5: cm[1]==='<', partial3: cm[3]==='>'
        };
      } else if (currentFeature) {
        currentFeature.spans.push(span);
        if (cm[1]==='<') currentFeature.partial5 = true;
        if (cm[3]==='>') currentFeature.partial3 = true;
      }
      continue;
    }

    // qualifier
    let key = null, value = null;
    if (stripped.includes('\t')) {
      const parts = stripped.split('\t');
      key = parts[0].trim(); value = parts[1]?.trim() || null;
    } else {
      const m = stripped.match(/^([A-Za-z_][A-Za-z0-9_]*)\s{2,}(.+)$/);
      if (m) { key = m[1]; value = m[2].trim(); }
      else if (/^[A-Za-z_][A-Za-z0-9_]*$/.test(stripped)) { key = stripped; }
    }
    if (key && currentFeature) {
      if (!currentFeature.qualifiers[key]) currentFeature.qualifiers[key] = [];
      if (value) currentFeature.qualifiers[key].push(value);
      else if (!currentFeature.qualifiers[key].length) currentFeature.qualifiers[key].push('');
    }
  }
  flushFeature();
  if (!tables.length) tables.push({ seqId: '<unnamed>', features: [] });
  return tables;
}

// ── validator ──────────────────────────────────────────────────────────────────
const TRANS_SPLICED = new Set(['nad1','nad2','nad5','rps12','nad7','nad4','cox2']);
const FORBIDDEN_Q   = new Set(['protein_id','transcript_id']);
const INVALID_Q     = new Set(['label','standard_name','blast_score','e_value','percent_identity']);
const DEPRECATED_Q  = new Set(['clone_lib','tissue_lib','sub_clone','sub_strain','pop_variant','identified_by','evidence','partial']);
const MAX_OVERLAP   = 3;

const EXPECTED_ANIMAL = new Set(['nad1','nad2','nad3','nad4','nad4l','nad5','nad6',
  'cox1','cox2','cox3','atp6','atp8','cob']);
const EXPECTED_PLANT  = new Set(['nad1','nad2','nad3','nad4','nad4l','nad5','nad6','nad7','nad9',
  'cox1','cox2','cox3','atp1','atp4','atp6','atp8','atp9','cob','matR','mttB']);
const EXPECTED_PLASTID = new Set(['rbcL','psbA','psbB','atpA','atpB','rpoA','rpoB',
  'ndhA','ndhB','ndhF','ycf1','ycf2','matK','clpP']);

function norm(s) { return s ? s.trim().toLowerCase() : null; }
function flen(f) { return f.spans.reduce((a,s)=>a+s.high-s.low+1, 0); }

function spansOverlap(a, b) {
  let total = 0;
  for (const sa of a.spans)
    for (const sb of b.spans)
      total += Math.max(0, Math.min(sa.high,sb.high) - Math.max(sa.low,sb.low) + 1);
  return total;
}

function featLabel(f) {
  if (!f) return '?';
  const n = f.geneName || f.productName || '?';
  const sp = f.spans.map(s => s.strand==='-' ? `c${s.start}-${s.end}` : `${s.start}-${s.end}`).join(',');
  return `${f.type}(${n}) @ ${sp}`;
}

function validate(table, organism) {
  const issues = [];
  const add = (sev, code, msg, f1, f2) => issues.push({ sev, code, msg, f1, f2 });

  const features = table.features;
  const genes  = features.filter(f=>f.type==='gene');
  const cdss   = features.filter(f=>f.type==='CDS');
  const trnas  = features.filter(f=>f.type==='tRNA');
  const rrnas  = features.filter(f=>f.type==='rRNA');
  const rnas   = [...trnas, ...rrnas];

  // ── format checks ──
  for (const f of features) {
    if (!f.spans.length)
      add('CRITICAL','NO_COORDINATES',`Feature '${f.type}' has no coordinates.`,f);

    const g = f.geneName;
    if (g && /^\d+$/.test(g))
      add('CRITICAL','GENE_NAME_IS_NUMBER',
        `gene qualifier is a raw number "${g}" — coordinate pasted into gene name field.\nFeature: ${featLabel(f)}`, f);

    if (g && /\s/.test(g))
      add('WARNING','GENE_NAME_WHITESPACE',
        `Gene name "${g}" contains whitespace.\nFeature: ${featLabel(f)}`, f);

    if (g && /\s+\d+$/.test(g))
      add('WARNING','GENE_NAME_NUMBER_SUFFIX',
        `Gene name "${g}" looks like auto-numbered (e.g. "gene 1").\nFeature: ${featLabel(f)}`, f);

    // strand within multi-span (EXCEPTION: trans-spliced genes allowed)
    if (f.spans.length > 1) {
      const strands = new Set(f.spans.map(s=>s.strand));
      const gn = norm(f.geneName);
      const isTransSpliced = gn && TRANS_SPLICED.has(gn);
      if (strands.size > 1 && !isTransSpliced)
        add('CRITICAL','MIXED_STRAND_IN_FEATURE',
          `Mixed strand directions in feature: ${featLabel(f)}`, f);
    }

    // forbidden qualifiers
    for (const k of Object.keys(f.qualifiers)) {
      if (FORBIDDEN_Q.has(k))
        add('CRITICAL','FORBIDDEN_QUALIFIER',
          `Qualifier '${k}' must NOT appear in .tbl files.\nFeature: ${featLabel(f)}`, f);
      if (INVALID_Q.has(k))
        add('WARNING','INVALID_QUALIFIER',
          `Qualifier '${k}' is invalid (BLAST/tool artefact?)\nFeature: ${featLabel(f)}`, f);
      if (f.type==='gene' && ['product','codon_start','protein_id'].includes(k))
        add('WARNING','QUALIFIER_ON_GENE',
          `Qualifier '${k}' should be on CDS/tRNA, not on gene feature.\nFeature: ${featLabel(f)}`, f);
    }
  }

  // ── gene ↔ CDS/RNA association ──
  const nameToGenes = {};
  for (const g of genes) {
    const key = norm(g.geneName);
    if (key) { if (!nameToGenes[key]) nameToGenes[key]=[];
               nameToGenes[key].push(g); }
  }

  const geneHasChild = new Map(genes.map(g=>[g,false]));
  const cdsHasGene   = new Map(cdss.map(c=>[c,false]));
  const rnaHasGene   = new Map(rnas.map(r=>[r,false]));

  for (const cds of cdss) {
    const cn = norm(cds.geneName);
    let matched = null;

    if (cn && nameToGenes[cn]) {
      const outsideCandidates = [];
      for (const g of nameToGenes[cn]) {
        // Check all CDS spans are within gene's overall LOW to HIGH range
        const allIn = cds.spans.every(s => s.low >= g.low && s.high <= g.high);
        if (allIn) { matched = g; break; }
        else outsideCandidates.push(g);
      }
      // Only warn when CDS genuinely overshoots the gene boundary
      if (!matched) {
        for (const g of outsideCandidates) {
          const overshoot = Math.max(0, g.low - cds.low) + Math.max(0, cds.high - g.high);
          if (overshoot > 1)
            add('WARNING','CDS_OUTSIDE_GENE',
              `CDS ${featLabel(cds)} shares gene name with ${featLabel(g)} but CDS extends ${overshoot} bp outside the gene boundary.`,cds,g);
        }
        if (outsideCandidates.length) matched = outsideCandidates[0]; // best-guess fallback
      }
    }

    if (!matched) {
      for (const g of genes) {
        if (spansOverlap(cds,g)>0) {
          const gn = norm(g.geneName);
          if (cn && gn && cn!==gn)
            add('WARNING','GENE_CDS_NAME_MISMATCH',
              `CDS has gene="${cds.geneName}" but overlapping gene has gene="${g.geneName}"\nCDS: ${featLabel(cds)}`,cds,g);
          matched = g; break;
        }
      }
    }

    if (matched) { geneHasChild.set(matched,true); cdsHasGene.set(cds,true); }
    else add('CRITICAL','CDS_WITHOUT_GENE',
      `CDS has no associated gene feature: ${featLabel(cds)}\n→ NCBI will reject: "CDS not associated with a gene"`, cds);
  }

  for (const rna of rnas) {
    const rn = norm(rna.geneName);
    let matched = null;
    if (rn && nameToGenes[rn]) {
      for (const g of nameToGenes[rn])
        if (spansOverlap(rna,g)>0) { matched=g; break; }
    }
    if (!matched)
      for (const g of genes)
        if (spansOverlap(rna,g)>0) { matched=g; break; }

    if (matched) { geneHasChild.set(matched,true); rnaHasGene.set(rna,true); }
    else add('CRITICAL','RNA_WITHOUT_GENE',
      `${rna.type} has no associated gene feature: ${featLabel(rna)}`, rna);
  }

  for (const g of genes) {
    if (!geneHasChild.get(g))
      add('CRITICAL','GENE_WITHOUT_CHILD',
        `Gene feature has no associated CDS or RNA: ${featLabel(g)}\nEvery gene must have a child feature.`, g);
  }

  // duplicate gene names
  for (const [name, glist] of Object.entries(nameToGenes)) {
    if (glist.length>1) {
      const coords = glist.map(g=>`${g.low}-${g.high}`);
      if (new Set(coords).size===coords.length)
        add('WARNING','DUPLICATE_GENE_NAME',
          `Gene name "${name}" appears ${glist.length}× with different coords: ${coords.join(', ')}`, glist[0]);
    }
  }

  // strand (skip trans-spliced genes)
  for (const g of genes) {
    const gn = norm(g.geneName);
    if (gn && TRANS_SPLICED.has(gn)) continue; // trans-spliced genes have mixed strands
    const gs = g.spans[0]?.strand ?? '?';
    for (const f of features) {
      if (f===g) continue;
      const fn = norm(f.geneName);
      if (fn && gn && fn===gn && f.spans.length) {
        const fs = f.spans[0].strand;
        if (fs !== gs)
          add('CRITICAL','STRAND_MISMATCH',
            `Strand mismatch: ${featLabel(g)} is ${gs} but associated ${featLabel(f)} is ${fs}`, g, f);
      }
    }
  }

  // ── overlaps ──
  for (const cds of cdss) {
    for (const rna of rnas) {
      const ov = spansOverlap(cds,rna);
      if (ov > MAX_OVERLAP)
        add('CRITICAL','ILLEGAL_CDS_RNA_OVERLAP',
          `Overlap is too long: ${ov} bp\n  CDS  "${cds.geneName||'?'}"  ${featLabel(cds).split('@ ')[1]}\n  ${rna.type} "${rna.productName||rna.geneName||'?'}"  ${featLabel(rna).split('@ ')[1]}\n→ NCBI rejects CDS↔RNA overlaps > ${MAX_OVERLAP} bp. Adjust coordinates.`, cds, rna);
      else if (ov>0)
        add('INFO','SMALL_CDS_RNA_OVERLAP',
          `Small overlap (${ov} bp) within tolerance: CDS "${cds.geneName}" ↔ ${rna.type} "${rna.geneName||rna.productName}"`, cds, rna);
    }
  }
  for (let i=0;i<cdss.length;i++)
    for (let j=i+1;j<cdss.length;j++) {
      const ov=spansOverlap(cdss[i],cdss[j]);
      if (ov>0)
        add('WARNING','CDS_CDS_OVERLAP',
          `CDS features overlap by ${ov} bp: ${featLabel(cdss[i])} ↔ ${featLabel(cdss[j])}`, cdss[i], cdss[j]);
    }

  // ── biological ──
  for (const f of features) {
    if (f.type==='tRNA') {
      const len=flen(f);
      if (len<60||len>100)
        add('WARNING','TRNA_UNUSUAL_SIZE',
          `tRNA ${featLabel(f)} length ${len} bp outside expected 60–100 bp range`, f);
      if (!f.productName)
        add('WARNING','TRNA_MISSING_PRODUCT',`tRNA ${featLabel(f)} has no product qualifier`,f);
    }
    if (f.type==='rRNA') {
      if (!f.productName)
        add('WARNING','RRNA_MISSING_PRODUCT',`rRNA ${featLabel(f)} has no product qualifier`,f);
    }
    if (f.type==='CDS') {
      const cs_str = f.qualifiers['codon_start']?.[0] || '1';
      const cs = parseInt(cs_str)||1;
      if (![1,2,3].includes(cs))
        add('CRITICAL','INVALID_CODON_START',`codon_start=${cs} is invalid (must be 1,2,3)\n${featLabel(f)}`,f);

      const cdsLen = flen(f);
      const eff = cdsLen-(cs-1);
      if (!f.partial3 && eff%3!==0)
        add('WARNING','CDS_NOT_DIV3',
          `CDS ${featLabel(f)} effective length ${eff} bp not divisible by 3 (codon_start=${cs}). Check for frameshifts.`,f);

      if (cdsLen<100 && !f.partial5 && !f.partial3)
        add('WARNING','SUSPICIOUS_CDS_LENGTH',
          `CDS ${featLabel(f)} is only ${cdsLen} bp — unusually short for a complete CDS`,f);

      if (!f.qualifiers['codon_start'])
        add('INFO','MISSING_CODON_START',
          `CDS ${featLabel(f)} lacks codon_start qualifier (defaults to 1)`,f);

      if (!f.productName)
        add('WARNING','MISSING_PRODUCT',`CDS ${featLabel(f)} lacks product qualifier`,f);

      if (!f.qualifiers['transl_table'])
        add('WARNING','MISSING_TRANSL_TABLE',
          `CDS ${featLabel(f)} lacks transl_table (e.g. 2=animal mt, 11=plant plastid)`,f);

      const gn=norm(f.geneName);
      if (gn && TRANS_SPLICED.has(gn) && f.spans.length<2)
        add('WARNING','TRANS_SPLICED_SINGLE_SPAN',
          `Gene "${f.geneName}" is known to be trans-spliced but CDS has only one span. Expected join() with multiple segments.`,f);
    }
  }

  // missing expected genes
  const presentGenes = new Set(features.map(f=>norm(f.geneName)).filter(Boolean));
  const expected = organism==='animal' ? EXPECTED_ANIMAL : organism==='plant' ? EXPECTED_PLANT : EXPECTED_PLASTID;
  const missing = [...expected].filter(g=>!presentGenes.has(g));
  if (missing.length)
    add('INFO','POSSIBLY_MISSING_GENES',
      `Possibly missing expected genes (may be unannotated or absent):\n${missing.sort().join(', ')}`);

  return issues;
}

// ── UI ─────────────────────────────────────────────────────────────────────────
let _activeFilters = new Set(['CRITICAL','WARNING','INFO']);
let _lastIssues = [], _lastFeatures = [], _lastSeqId = '';
let _fastaSequences = {}; // Store FASTA sequences: {seqId: "ATGCG..."}
let _fastaLoaded = false;

function runValidation() {
  const text = document.getElementById('pasteArea').value.trim();
  if (!text) { alert('Please paste a feature table or load a file.'); return; }

  const organism = document.getElementById('organism').value;
  const btn = document.getElementById('validateBtn');
  btn.disabled = true; btn.textContent = '⏳ Validating...';

  setTimeout(() => {
    try {
      const tables = parseFeatureTable(text);
      let allIssues = [], allFeatures = [];
      let seqId = tables[0]?.seqId || '<unnamed>';

      for (const t of tables) {
        allIssues   = allIssues.concat(validate(t, organism));
        allFeatures = allFeatures.concat(t.features);
        if (tables.length>1) seqId = tables.map(t=>t.seqId).join(', ');
      }

      _lastIssues   = allIssues;
      _lastFeatures = allFeatures;
      _lastSeqId    = seqId;
      _activeFilters = new Set(['CRITICAL','WARNING','INFO']);
      renderResults(allIssues, allFeatures, seqId);
    } catch(e) {
      document.getElementById('results').innerHTML =
        `<div style="color:var(--crit);padding:20px;font-family:var(--mono)">Parse error: ${e.message}</div>`;
    }
    btn.disabled = false; btn.textContent = '▶ Validate';
  }, 50);
}

function renderResults(issues, features, seqId) {
  const crits = issues.filter(i=>i.sev==='CRITICAL');
  const warns  = issues.filter(i=>i.sev==='WARNING');
  const infos  = issues.filter(i=>i.sev==='INFO');

  const jsonData = {
    sequence_id: seqId,
    summary: { critical: crits.length, warnings: warns.length, info: infos.length },
    errors: crits.map(i=>({code:i.code, message:i.msg})),
    warnings: warns.map(i=>({code:i.code, message:i.msg})),
    info: infos.map(i=>({code:i.code, message:i.msg})),
    features: features.map(f=>({
      type:f.type, gene:f.geneName, product:f.productName,
      spans:f.spans.map(s=>s.strand==='-'?`c${s.start}-${s.end}`:`${s.start}-${s.end}`),
      strand: f.spans[0]?.strand||'?'
    }))
  };

  let html = `
  <div class="summary-bar">
    <div class="stat stat-crit" data-tip="Submission will fail">
      <div class="stat-value">${crits.length}</div>
      <div class="stat-label">Critical</div>
    </div>
    <div class="stat stat-warn" data-tip="Likely problematic">
      <div class="stat-value">${warns.length}</div>
      <div class="stat-label">Warnings</div>
    </div>
    <div class="stat stat-info" data-tip="Optional improvements">
      <div class="stat-value">${infos.length}</div>
      <div class="stat-label">Info</div>
    </div>
    <div class="stat stat-feat" data-tip="Total features parsed">
      <div class="stat-value">${features.length}</div>
      <div class="stat-label">Features</div>
    </div>
    ${_fastaLoaded ? `
    <div class="stat" style="background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.3)" data-tip="FASTA loaded - BLAST buttons enabled">
      <div class="stat-value" style="color:var(--accent);font-size:1.5rem">✓</div>
      <div class="stat-label" style="color:var(--accent)">FASTA</div>
    </div>` : ''}
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('issues',this)">Issues (${issues.length})</div>
    <div class="tab" onclick="switchTab('features',this)">Features (${features.length})</div>
    <div class="tab" onclick="switchTab('json',this)">JSON Export</div>
  </div>

  <div class="tab-panel">
    <div id="tab-issues" class="tab-content active">
      <div class="filters">
        <div class="chip crit-chip ${_activeFilters.has('CRITICAL')?'active':''}" onclick="toggleFilter('CRITICAL',this)">🔴 Critical (${crits.length})</div>
        <div class="chip warn-chip ${_activeFilters.has('WARNING')?'active':''}" onclick="toggleFilter('WARNING',this)">🟡 Warning (${warns.length})</div>
        <div class="chip info-chip ${_activeFilters.has('INFO')?'active':''}" onclick="toggleFilter('INFO',this)">🔵 Info (${infos.length})</div>
      </div>
      <div id="issueList">${renderIssueList(issues)}</div>
    </div>

    <div id="tab-features" class="tab-content">
      ${renderFeaturesTable(features)}
    </div>

    <div id="tab-json" class="tab-content">
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn btn-secondary" style="font-size:.78rem;padding:7px 14px"
          onclick="copyJson()">📋 Copy JSON</button>
      </div>
      <div class="json-out" id="jsonOut">${escHtml(JSON.stringify(jsonData, null, 2))}</div>
    </div>
  </div>`;

  document.getElementById('results').innerHTML = html;
}

function renderIssueList(issues) {
  const filtered = issues.filter(i => _activeFilters.has(i.sev));
  if (!filtered.length)
    return `<div class="empty-state"><div class="empty-icon">✅</div>No issues to show.</div>`;

  return filtered.map((issue, idx) => `
  <div class="issue ${issue.sev.toLowerCase()}" style="animation-delay:${idx*0.03}s">
    <div class="issue-badge">${issue.sev}</div>
    <div class="issue-body">
      <div class="issue-code">${issue.code}</div>
      <div class="issue-msg">${escHtml(issue.msg)}</div>
      ${issue.f1 ? `<div class="feature-info">feature: ${escHtml(featLabel(issue.f1))}${issue.f2?'\nfeature2: '+escHtml(featLabel(issue.f2)):''}</div>`:''}
    </div>
  </div>`).join('');
}

function renderFeaturesTable(features) {
  if (!features.length) return '<div class="empty-state"><div class="empty-icon">📭</div>No features parsed.</div>';

  const typeTag = t => {
    const cls = {gene:'tag-gene',CDS:'tag-cds',tRNA:'tag-trna',rRNA:'tag-rrna'}[t]||'tag-misc';
    return `<span class="tag ${cls}">${t}</span>`;
  };
  const strandIcon = s => s==='-'
    ? `<span class="strand-minus">− rev</span>`
    : `<span class="strand-plus">+ fwd</span>`;

  return `<div class="features-table-wrap"><table>
    <thead><tr>
      <th>#</th><th>Type</th><th>Gene</th><th>Product</th>
      <th>Coordinates</th><th>Spans</th><th>Strand</th><th>Partial</th>
      ${_fastaLoaded ? '<th>BLAST</th>' : ''}
    </tr></thead>
    <tbody>
    ${features.map((f,i) => `<tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td>${typeTag(f.type)}</td>
      <td>${escHtml(f.geneName||'—')}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(f.productName||'—')}</td>
      <td>${f.spans.map(s=>s.strand==='-'?`c${s.start}–${s.end}`:`${s.start}–${s.end}`).join('<br>')}</td>
      <td style="color:var(--muted)">${f.spans.length}</td>
      <td>${strandIcon(f.spans[0]?.strand||'+')}</td>
      <td style="color:var(--muted);font-size:.7rem">${[f.partial5?'5\'':'',f.partial3?'3\'':''].filter(Boolean).join(' ')||'—'}</td>
      ${_fastaLoaded && f.type==='CDS' ? `<td><button class="btn btn-secondary" style="font-size:.72rem;padding:4px 10px" onclick="blastCDS(${i})">🧬 BLAST</button></td>` : _fastaLoaded ? '<td>—</td>' : ''}
    </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name)?.classList.add('active');
}

function toggleFilter(sev, el) {
  if (_activeFilters.has(sev)) _activeFilters.delete(sev);
  else _activeFilters.add(sev);
  el.classList.toggle('active');
  document.getElementById('issueList').innerHTML = renderIssueList(_lastIssues);
}

function copyJson() {
  const txt = document.getElementById('jsonOut')?.textContent || '';
  navigator.clipboard?.writeText(txt).then(()=>{
    const btn = event.target;
    btn.textContent = '✅ Copied!';
    setTimeout(()=>btn.textContent='📋 Copy JSON', 1500);
  });
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function blastCDS(featureIndex) {
  const feature = _lastFeatures[featureIndex];
  if (!feature || feature.type !== 'CDS') {
    alert('Error: Not a CDS feature');
    return;
  }
  
  const geneName = feature.geneName || feature.productName || 'unknown';
  const seqId = _lastSeqId;
  
  // Extract CDS sequence from FASTA
  const cdsSeq = extractCDSSequence(feature, seqId);
  
  if (!cdsSeq) {
    alert(`Could not extract sequence for ${geneName}.\n\nPossible issues:\n• Sequence ID mismatch (FASTA: "${Object.keys(_fastaSequences).join(', ')}" vs TBL: "${seqId}")\n• Coordinates out of range`);
    return;
  }
  
  // Build NCBI BLASTN URL with pre-filled sequence
  const blastUrl = 'https://blast.ncbi.nlm.nih.gov/Blast.cgi?' + new URLSearchParams({
    PROGRAM: 'blastn',
    PAGE_TYPE: 'BlastSearch',
    QUERY: cdsSeq,
    JOB_TITLE: `${geneName} (${feature.spans.length} exon${feature.spans.length>1?'s':''})`,
    DATABASE: 'nt',
    BLAST_PROGRAMS: 'megaBlast'
  });
  
  // Show info dialog
  const info = `🧬 BLAST CDS: ${geneName}

📊 Feature Info:
  • Gene: ${geneName}
  • Coordinates: ${feature.spans.map(s=>s.strand==='-'?`c${s.start}-${s.end}`:`${s.start}-${s.end}`).join(', ')}
  • Length: ${cdsSeq.length} bp
  • Exons: ${feature.spans.length}

🔍 Sequence extracted and ready to BLAST.

Click OK to open NCBI BLASTN in a new window.

💡 What to check in BLAST results:
  ✓ Top hit matches expected gene name
  ✓ Query coverage ~100% (complete gene)
  ✓ Percent identity >95% (correct species)
  ⚠ Low coverage = missing exons/partial
  ⚠ Wrong gene = annotation error`;
  
  if (confirm(info)) {
    window.open(blastUrl, '_blank');
  }
}

// keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') runValidation();
});
</script>
</body>
</html>
